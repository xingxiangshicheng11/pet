<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="washBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF8F2"/>
      <stop offset="100%" stop-color="#F0E8D8"/>
    </linearGradient>
    <linearGradient id="inkLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2C1810" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2C1810" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2C1810" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#washBg)"/>

  <g opacity="0.04">
    <path d="M640 -50 Q700 200 620 450 Q540 700 640 770" fill="none" stroke="#2D5A27" stroke-width="100"/>
  </g>

  <line x1="100" y1="80" x2="100" y2="160" stroke="#C41E3A" stroke-width="2" opacity="0.5"/>
  <text x="120" y="130" font-family="KaiTi, STKaiti, SimSun, serif" font-size="42" fill="#2C1810" font-weight="bold" letter-spacing="4">紫气东来</text>
  <text x="340" y="130" font-family="SimSun, Songti SC, serif" font-size="22" fill="#6B6B6B" letter-spacing="2">—— 紫薯的书法之路</text>
  <line x1="100" y1="155" x2="1180" y2="155" stroke="url(#inkLine)" stroke-width="0.8"/>

  <g transform="translate(120, 200)">
    <circle cx="18" cy="18" r="18" fill="none" stroke="#C41E3A" stroke-width="1" opacity="0.5"/>
    <text x="18" y="23" text-anchor="middle" font-family="SimSun, Songti SC, serif" font-size="16" fill="#C41E3A">一</text>
    <text x="55" y="23" font-family="KaiTi, STKaiti, SimSun, serif" font-size="24" fill="#2C1810" letter-spacing="2">初识笔墨</text>
    <text x="55" y="58" font-family="SimSun, Songti SC, serif" font-size="18" fill="#3C2415">从第一次握笔，到写出第一个完整的字，</text>
    <text x="55" y="84" font-family="SimSun, Songti SC, serif" font-size="18" fill="#3C2415">笔墨之间，便结下了不解之缘。</text>
  </g>

  <g transform="translate(120, 310)">
    <circle cx="18" cy="18" r="18" fill="none" stroke="#C41E3A" stroke-width="1" opacity="0.5"/>
    <text x="18" y="23" text-anchor="middle" font-family="SimSun, Songti SC, serif" font-size="16" fill="#C41E3A">二</text>
    <text x="55" y="23" font-family="KaiTi, STKaiti, SimSun, serif" font-size="24" fill="#2C1810" letter-spacing="2">寒暑不辍</text>
    <text x="55" y="58" font-family="SimSun, Songti SC, serif" font-size="18" fill="#3C2415">多少个日夜，在书桌前挥毫泼墨，</text>
    <text x="55" y="84" font-family="SimSun, Songti SC, serif" font-size="18" fill="#3C2415">每一笔都是坚持，每一划都是热爱。</text>
  </g>

  <g transform="translate(120, 420)">
    <circle cx="18" cy="18" r="18" fill="none" stroke="#C41E3A" stroke-width="1" opacity="0.5"/>
    <text x="18" y="23" text-anchor="middle" font-family="SimSun, Songti SC, serif" font-size="16" fill="#C41E3A">三</text>
    <text x="55" y="23" font-family="KaiTi, STKaiti, SimSun, serif" font-size="24" fill="#2C1810" letter-spacing="2">终成大器</text>
    <text x="55" y="58" font-family="SimSun, Songti SC, serif" font-size="18" fill="#3C2415">墨池功深，笔冢成山，今日终得大成。</text>
    <text x="55" y="84" font-family="SimSun, Songti SC, serif" font-size="18" fill="#3C2415">这是对你多年坚持最好的回报。</text>
  </g>

  <g transform="translate(120, 530)">
    <circle cx="18" cy="18" r="18" fill="none" stroke="#2D5A27" stroke-width="1" opacity="0.5"/>
    <text x="18" y="23" text-anchor="middle" font-family="SimSun, Songti SC, serif" font-size="16" fill="#2D5A27">四</text>
    <text x="55" y="23" font-family="KaiTi, STKaiti, SimSun, serif" font-size="24" fill="#2C1810" letter-spacing="2">未来可期</text>
    <text x="55" y="58" font-family="SimSun, Songti SC, serif" font-size="18" fill="#3C2415">百尺竿头须进步，十方世界是全身。</text>
    <text x="55" y="84" font-family="SimSun, Songti SC, serif" font-size="18" fill="#3C2415">期待紫薯在书法艺术上继续攀登新高峰。</text>
  </g>

  <text x="1180" y="660" font-family="SimSun, Songti SC, serif" font-size="14" fill="#9E8E7E" text-anchor="end">04 / 05</text>
</svg>