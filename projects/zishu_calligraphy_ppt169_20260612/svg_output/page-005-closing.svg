<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <radialGradient id="bgWarm" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="50%" stop-color="#EDE4D4"/>
      <stop offset="100%" stop-color="#D4C5A9"/>
    </radialGradient>
    <linearGradient id="goldGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="inkWash" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#2C1810" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#2C1810" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgWarm)"/>

  <g opacity="0.06">
    <path d="M100 500 Q300 450 500 520 Q700 590 900 500 Q1100 410 1200 490" fill="none" stroke="#2C1810" stroke-width="4"/>
    <path d="M50 550 Q200 500 400 560 Q600 620 800 540 Q1000 460 1150 530" fill="none" stroke="#2C1810" stroke-width="2"/>
  </g>

  <g opacity="0.08">
    <circle cx="640" cy="250" r="100" fill="none" stroke="#8B6914" stroke-width="1.5"/>
    <circle cx="640" cy="250" r="75" fill="none" stroke="#8B6914" stroke-width="1"/>
    <circle cx="640" cy="250" r="50" fill="none" stroke="#8B6914" stroke-width="0.5"/>
  </g>

  <text x="640" y="270" text-anchor="middle" font-family="KaiTi, STKaiti, SimSun, serif" font-size="48" fill="#2C1810" font-weight="bold">福寿康宁</text>

  <rect x="440" y="295" width="400" height="2" fill="url(#goldGlow)"/>

  <text x="640" y="330" text-anchor="middle" font-family="SimSun, Songti SC, serif" font-size="24" fill="#7A6B5D">翰墨长青 · 艺无止境</text>

  <text x="640" y="390" text-anchor="middle" font-family="SimSun, Songti SC, serif" font-size="20" fill="#3C2415" line-height="2">愿紫薯在书法的世界里，</text>
  <text x="640" y="420" text-anchor="middle" font-family="SimSun, Songti SC, serif" font-size="20" fill="#3C2415" line-height="2">笔锋所至，皆是风景；</text>
  <text x="640" y="450" text-anchor="middle" font-family="SimSun, Songti SC, serif" font-size="20" fill="#3C2415" line-height="2">墨香所及，皆有欢喜。</text>

  <text x="640" y="520" text-anchor="middle" font-family="KaiTi, STKaiti, SimSun, serif" font-size="22" fill="#8B6914">愿书法之路，越走越宽，越走越远。</text>

  <g transform="translate(530, 580)">
    <rect x="0" y="0" width="220" height="2" fill="url(#goldGlow)"/>
    <text x="110" y="30" text-anchor="middle" font-family="SimSun, Songti SC, serif" font-size="16" fill="#9E8E7E">—— 2026 年 6 月 谨贺 ——</text>
  </g>

  <text x="1180" y="660" font-family="SimSun, Songti SC, serif" font-size="14" fill="#9E8E7E" text-anchor="end">05 / 05</text>
</svg>