services:
  redis:
    image: redis:7-alpine
    container_name: pet-redis
    restart: unless-stopped
    networks:
      - pet-network

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://pet_user:pet_password@postgres:5432/pet_service?connection_limit=2
      JWT_SECRET: pet-service-jwt-secret-2026
      PORT: 3001
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - pet-network

networks:
  pet-network:
    name: pet-network
    driver: bridge
