services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pet_user
      POSTGRES_PASSWORD: pet_password
      POSTGRES_DB: pet_service
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pet_user -d pet_service"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
