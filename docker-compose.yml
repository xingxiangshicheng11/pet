services:
  redis:
    image: redis:7-alpine
    container_name: pet-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - pet-network

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://pet_user:pet_password@postgres:5432/pet_service?connection_limit=50
      JWT_SECRET: pet-service-jwt-secret-2026
      PORT: 3001
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - pet-network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pet-network

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - pet-network

networks:
  pet-network:
    external: true
